name: Convert all Markdown to HTML

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  markdown-to-html:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Check out repository
        uses: actions/checkout@v4

      # Install Pandoc for Markdown to HTML conversion
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # Find and convert all .md files to .html
      - name: Convert all Markdown files to HTML
        run: |
          mkdir -p html_output
          for file in $(find . -type f -name "*.md"); do
            filename=$(basename "$file" .md)
            pandoc "$file" -f markdown -t html --template=template.html -s --highlight-style=pygments -c github-markdown.css -o "html_output/${filename}.html"
          done

      # Upload all generated HTML files as artifacts
      - name: Upload HTML outputs
        uses: actions/upload-artifact@v4
        with:
          name: html-files
          path: html_output/
